<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 카드 장부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#1C2536; --paper:#FAFAF8; --card:#FFFFFF; --line:#E5E3DC; --mut:#8A897F;
  --joint:#C94F6D; --biz:#0F6E56; --me:#4A56B8; --him:#185FA5; --grp:#B87514; --ok:#3B6D11; --bad:#B2402F;
  --joint-bg:#FBEAF0; --biz-bg:#E1F5EE; --me-bg:#ECEEFA; --him-bg:#E6F1FB; --grp-bg:#FAEEDA;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;background:var(--paper);color:var(--ink);font-size:15px;line-height:1.5;padding-bottom:40px}
.wrap{max-width:680px;margin:0 auto;padding:0 16px}
header{padding:26px 0 4px}
header h1{font-size:21px;font-weight:800;letter-spacing:-0.5px}
header p{font-size:12px;color:var(--mut)}
.num{font-variant-numeric:tabular-nums}
nav{display:flex;gap:6px;margin:14px 0 18px;overflow-x:auto}
nav button{flex:1;min-width:58px;padding:9px 2px;border:1px solid var(--line);background:var(--card);border-radius:10px;font-size:12.5px;font-weight:700;color:var(--mut);cursor:pointer;font-family:inherit;white-space:nowrap}
nav button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.card h2{font-size:14px;font-weight:800;margin-bottom:10px}
.card h2 small{font-weight:500;color:var(--mut);font-size:11px;margin-left:5px}
input,select,textarea{font-family:inherit;font-size:15px;padding:10px 11px;border:1px solid var(--line);border-radius:10px;width:100%;background:#fff}
input:focus,select:focus{outline:2px solid var(--ink);outline-offset:-1px}
.row{display:flex;gap:8px;margin-bottom:9px}
.row>*{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.chip{padding:6px 11px;border-radius:99px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.seg{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap}
.seg button{flex:1;min-width:52px;padding:8px 2px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--mut)}
.seg button.s-joint.on{background:var(--joint-bg);color:var(--joint);border-color:var(--joint)}
.seg button.s-me.on{background:var(--me-bg);color:var(--me);border-color:var(--me)}
.seg button.s-him.on{background:var(--him-bg);color:var(--him);border-color:var(--him)}
.seg button.s-biz.on{background:var(--biz-bg);color:var(--biz);border-color:var(--biz)}
.seg button.s-grp.on{background:var(--grp-bg);color:var(--grp);border-color:var(--grp)}
.btn{padding:11px 14px;border-radius:10px;border:1px solid var(--ink);background:var(--ink);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;width:100%}
.btn.ghost{background:transparent;color:var(--ink)}
.btn.sm{width:auto;padding:7px 12px;font-size:12.5px;font-weight:700}
.pill{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:99px}
.p-joint{background:var(--joint-bg);color:var(--joint)}.p-me{background:var(--me-bg);color:var(--me)}
.p-him{background:var(--him-bg);color:var(--him)}.p-biz{background:var(--biz-bg);color:var(--biz)}
.p-grp{background:var(--grp-bg);color:var(--grp)}.p-in{background:#EAF3DE;color:var(--ok)}
.item{display:flex;justify-content:space-between;gap:10px;padding:10px 2px;border-bottom:1px solid #F1EFE8;align-items:center}
.item .l b{font-size:14px}
.item .l div{font-size:11px;color:var(--mut);margin-top:2px}
.item .r{text-align:right}
.item .r b{font-size:15px}
.item .del{border:none;background:none;color:#C9C7BE;font-size:16px;cursor:pointer;padding:4px}
.stat3{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.stat{background:#F5F4EF;border-radius:10px;padding:10px 12px}
.stat .lb{font-size:11px;color:var(--mut)}
.stat .v{font-size:16px;font-weight:800;margin-top:2px}
.settle{background:var(--joint-bg);border-radius:12px;padding:14px;text-align:center;margin-top:12px}
.settle .big{font-size:22px;font-weight:900;color:var(--joint)}
.settle .lb{font-size:12px;color:var(--joint);opacity:0.8}
.hint{font-size:12px;color:var(--mut);margin-top:8px}
.gcard{border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px}
.gcard h3{font-size:14px;font-weight:800}
.gcard .gsum{font-size:12px;color:var(--mut);margin:4px 0 8px}
.bar{display:flex;justify-content:space-between;font-size:13px;padding:6px 2px;border-bottom:1px solid #F1EFE8}
.savebar{position:sticky;bottom:0;background:linear-gradient(transparent,var(--paper) 30%);padding:14px 0 8px;display:flex;justify-content:space-between;align-items:center}
.savebar .st{font-size:11px;color:var(--mut)}
.toast{color:var(--ok);font-weight:700}
#loading{text-align:center;padding:60px 0;color:var(--mut);font-size:13px}
.catbar{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:7px}
.catbar .track{flex:1;height:7px;background:#EFEDE6;border-radius:4px;margin:0 10px;overflow:hidden}
.catbar .track i{display:block;height:100%;background:var(--joint);border-radius:4px}
textarea{resize:none;height:60px}
</style>
</head>
<body>
<div class="wrap">
<header><h1>우리 카드 장부</h1><p>레드카드 · 결제 10초 기록 → 월말 자동 정산 → 엑셀</p></header>
<div id="loading">불러오는 중…</div>
<div id="app" style="display:none">
<nav id="nav"></nav>
<div id="view"></div>
<div class="savebar"><span class="st" id="savestat"></span><button class="btn sm" onclick="saveAll(true)">저장</button></div>
</div>
</div>
<script>
const KEY='taena-couple-ledger-v1';
const fmt=n=>(n<0?'-':'')+'₩'+Math.abs(Math.round(n)).toLocaleString();
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const CATS=['외식·카페','배달음식','온라인쇼핑','마트·편의점','주유·차량','쇼핑(백화점·패션)','주류','여행·숙박','택시·교통','의료·약국','문화·레저','구독·디지털','통신','수수료','기타'];
const AUTO={'배민':'배달음식','우아한':'배달음식','쿠팡':'온라인쇼핑','이마트':'마트·편의점','트레이더스':'마트·편의점','GS25':'마트·편의점','CU':'마트·편의점','씨유':'마트·편의점','코스트코':'마트·편의점','다이소':'마트·편의점','주유':'주유·차량','세차':'주유·차량','스타벅스':'외식·카페','카페':'외식·카페','버거':'외식·카페','파리바게뜨':'외식·카페','약국':'의료·약국','병원':'의료·약국','의원':'의료·약국','택시':'택시·교통','넷플릭스':'구독·디지털','백화점':'쇼핑(백화점·패션)','아울렛':'쇼핑(백화점·패션)','올리브영':'쇼핑(백화점·패션)','아고다':'여행·숙박','호텔':'여행·숙박'};
const MERCH=['쿠팡','배민','이마트 트레이더스','GS25','씨유','주유소','파리바게뜨','넷플릭스'];
const WHO=[['공용','joint'],['태나','me'],['지훈','him'],['회사','biz'],['모임','grp']];
const DEFAULT={month:new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0'), entries:[], transfers:[], groups:[], archive:[], lastSaved:null};
let S=null, tab='add', backend='memory';
let fx={amount:'',merchant:'',cat:'',who:'공용',payer:'태나',groupId:'',memo:''};
let tform={amount:'',name:'',dir:'out',who:'공용',payer:'태나',groupId:'',memo:''};

async function detectBackend(){
  if(typeof window.storage!=='undefined'&&window.storage&&typeof window.storage.set==='function'){
    try{ await window.storage.set(KEY+'-ping','1'); backend='claude'; return; }catch(e){}
  }
  try{ localStorage.setItem(KEY+'-ping','1'); localStorage.removeItem(KEY+'-ping'); backend='local'; return; }catch(e){}
  backend='memory';
}
async function readData(){
  if(backend==='claude'){try{const r=await window.storage.get(KEY);return r&&r.value?r.value:null;}catch(e){return null;}}
  if(backend==='local'){try{return localStorage.getItem(KEY);}catch(e){return null;}}
  return null;
}
async function writeData(str){
  if(backend==='claude'){
    try{ await window.storage.set(KEY,str); return true; }
    catch(e){ backend='local'; }
  }
  if(backend==='local'){
    try{ localStorage.setItem(KEY,str); return true; }
    catch(e){ backend='memory'; }
  }
  return false;
}
async function load(){
  await detectBackend();
  try{const raw=await readData();S=raw?JSON.parse(raw):JSON.parse(JSON.stringify(DEFAULT));}catch(e){S=JSON.parse(JSON.stringify(DEFAULT));}
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}
async function saveAll(toast){
  S.lastSaved=new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const ok=await writeData(JSON.stringify(S));
  const el=document.getElementById('savestat');
  if(ok){if(toast){el.innerHTML='<span class="toast">저장 완료 · '+S.lastSaved+'</span>';setTimeout(renderStat,2500);}else renderStat();}
  else el.textContent='임시 모드 — 닫기 전에 엑셀로 내보내 두세요';
}
function renderStat(){const lb=backend==='memory'?' · 임시 모드':'';document.getElementById('savestat').textContent=(S.lastSaved?'마지막 저장 '+S.lastSaved:'아직 저장 안 됨')+lb;}

const TABS=[['add','입력'],['list','내역'],['grp','모임'],['tr','이체'],['sum','정산·엑셀']];
function render(){
  document.getElementById('nav').innerHTML=TABS.map(([k,l])=>`<button class="${tab===k?'on':''}" onclick="go('${k}')">${l}</button>`).join('');
  const v=document.getElementById('view');
  if(tab==='add')v.innerHTML=addView();
  if(tab==='list')v.innerHTML=listView();
  if(tab==='grp')v.innerHTML=grpView();
  if(tab==='tr')v.innerHTML=trView();
  if(tab==='sum')v.innerHTML=sumView();
  renderStat();
}
function go(t){tab=t;render();}

/* ── 입력 ── */
function addView(){
  const gs=S.groups.filter(g=>!g.closed);
  return `<div class="card">
  <h2>레드카드 지출 입력 <small>${S.month} · 결제 직후 10초</small></h2>
  <div class="row"><input type="number" inputmode="numeric" placeholder="금액 (원)" id="f-amt" value="${fx.amount}" oninput="fx.amount=this.value"></div>
  <div class="chips">${MERCH.map(m=>`<button class="chip" onclick="pickMerch('${m}')">${m}</button>`).join('')}</div>
  <div class="row"><input placeholder="사용처" id="f-mer" value="${fx.merchant}" oninput="fx.merchant=this.value;autoCat()"></div>
  <div class="row"><select id="f-cat" onchange="fx.cat=this.value"><option value="">카테고리 선택</option>${CATS.map(c=>`<option ${fx.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
  <div class="seg">${WHO.map(([w,cls])=>`<button class="s-${cls} ${fx.who===w?'on':''}" onclick="fx.who='${w}';render()">${w}</button>`).join('')}</div>
  ${fx.who==='모임'?`<div class="row"><select onchange="fx.groupId=this.value"><option value="">어느 모임?</option>${gs.map(g=>`<option value="${g.id}" ${fx.groupId===g.id?'selected':''}>${g.name}</option>`).join('')}</select></div>`:''}
  <div class="seg"><button class="s-me ${fx.payer==='태나'?'on':''}" onclick="fx.payer='태나';render()">태나가 냄</button><button class="s-him ${fx.payer==='지훈'?'on':''}" onclick="fx.payer='지훈';render()">지훈이 냄</button></div>
  <div class="row"><input placeholder="메모 (선택)" value="${fx.memo}" oninput="fx.memo=this.value"></div>
  <button class="btn" onclick="addEntry()">기록하기</button>
  <p class="hint">기본값이 공용(반반)이에요. 회사 경비·개인 지출·모임 건만 바꿔 찍으면 돼요.</p>
  </div>`;
}
function pickMerch(m){fx.merchant=m;autoCat();render();}
function autoCat(){for(const k in AUTO){if(fx.merchant.includes(k)){fx.cat=AUTO[k];const s=document.getElementById('f-cat');if(s)s.value=AUTO[k];return;}}}
function addEntry(){
  const amt=parseInt(fx.amount)||0;
  if(!amt||!fx.merchant){alert('금액과 사용처를 입력해 주세요');return;}
  if(fx.who==='모임'&&!fx.groupId){alert('모임을 선택해 주세요 (모임 탭에서 먼저 만들 수 있어요)');return;}
  S.entries.unshift({id:Date.now(),date:today(),merchant:fx.merchant,amount:amt,cat:fx.cat||'기타',who:fx.who,payer:fx.payer,groupId:fx.who==='모임'?fx.groupId:'',memo:fx.memo,kind:'카드'});
  fx={amount:'',merchant:'',cat:'',who:'공용',payer:'태나',groupId:'',memo:''};
  saveAll(true);render();
}

/* ── 내역 ── */
function pillOf(w){return {'공용':'p-joint','태나':'p-me','지훈':'p-him','회사':'p-biz','모임':'p-grp'}[w]||'p-joint';}
function listView(){
  const tot=S.entries.reduce((a,e)=>a+e.amount,0);
  const items=S.entries.map(e=>{
    const g=e.groupId?S.groups.find(x=>x.id==e.groupId):null;
    return `<div class="item"><div class="l"><b>${e.merchant}</b><div>${e.date.slice(5)} · ${e.cat}${g?' · '+g.name:''}${e.memo?' · '+e.memo:''} · ${e.payer} 결제</div></div>
    <div class="r"><b class="num">${fmt(e.amount)}</b><br><span class="pill ${pillOf(e.who)}">${e.who}</span></div>
    <button class="del" onclick="delEntry(${e.id})">✕</button></div>`;
  }).join('');
  return `<div class="card"><h2>이번 달 카드 내역 <small>${S.entries.length}건 · ${fmt(tot)}</small></h2>${items||'<p class="hint">아직 기록이 없어요 — 입력 탭에서 시작해요.</p>'}</div>`;
}
function delEntry(id){if(confirm('이 기록을 삭제할까요?')){S.entries=S.entries.filter(e=>e.id!==id);saveAll();render();}}

/* ── 모임 ── */
function grpView(){
  const cards=S.groups.map(g=>{
    const ex=S.entries.filter(e=>e.groupId==g.id);
    const tr=S.transfers.filter(t=>t.groupId==g.id);
    const paidCard=ex.reduce((a,e)=>a+e.amount,0);
    const sent=tr.filter(t=>t.dir==='out').reduce((a,t)=>a+t.amount,0);
    const recv=tr.filter(t=>t.dir==='in').reduce((a,t)=>a+t.amount,0);
    const net=paidCard+sent-recv;
    const fair = g.mode==='n' ? '우리 몫 = 우리가 낸 결제 총액 ÷ '+g.n+' × '+g.our+'명' : '우리 팀 몫 = 전체의 절반';
    const toReceive = g.mode==='n' ? Math.round(paidCard/g.n*(g.n-g.our)) : Math.round(paidCard/2);
    return `<div class="gcard"><h3>${g.name} ${g.closed?'<span class="pill p-in">마감</span>':''}</h3>
    <div class="gsum">${g.date} · ${g.mode==='n'?g.n+'명 중 우리 '+g.our+'명 (1/N)':'두 팀 5:5'}</div>
    <div class="bar"><span>우리가 결제한 지출</span><b class="num">${fmt(paidCard)}</b></div>
    <div class="bar"><span>보낸 돈 (남이 결제 → 우리 몫 송금)</span><b class="num">${fmt(sent)}</b></div>
    <div class="bar"><span>받은 돈 (회수)</span><b class="num" style="color:var(--ok)">${fmt(recv)}</b></div>
    <div class="bar"><span><b>커플 순부담</b></span><b class="num">${fmt(net)}</b></div>
    <p class="hint">${fair} · 결제분 기준 받을 돈 참고치: ${fmt(toReceive)}</p>
    ${g.closed?'':`<div style="display:flex;gap:8px;margin-top:9px"><button class="btn sm ghost" onclick="closeGrp('${g.id}')">정산 마감</button><button class="btn sm ghost" onclick="delGrp('${g.id}')">삭제</button></div>`}
    </div>`;
  }).join('');
  return `<div class="card"><h2>모임 만들기 <small>N빵 · 커플여행</small></h2>
  <div class="row"><input id="g-name" placeholder="모임 이름 (예: 병찬 모임)"><input id="g-date" type="date" value="${today()}"></div>
  <div class="row"><select id="g-mode"><option value="n">1/N 인원별</option><option value="team">두 팀 5:5 (커플여행)</option></select>
  <input id="g-n" type="number" placeholder="총 인원" value="3"><input id="g-our" type="number" placeholder="우리 몫 인원" value="2"></div>
  <button class="btn" onclick="addGrp()">모임 추가</button>
  <p class="hint">지출은 입력 탭에서 "모임"으로, 보낸·받은 돈은 이체 탭에서 이 모임을 선택하면 자동으로 묶여요. 마감하면 커플 순부담의 절반이 월 정산에 자동 반영돼요.</p>
  </div>${cards}`;
}
function addGrp(){
  const name=document.getElementById('g-name').value.trim();
  if(!name){alert('모임 이름을 입력해 주세요');return;}
  S.groups.unshift({id:String(Date.now()),name,date:document.getElementById('g-date').value,mode:document.getElementById('g-mode').value,n:parseInt(document.getElementById('g-n').value)||3,our:parseInt(document.getElementById('g-our').value)||2,closed:false});
  saveAll(true);render();
}
function closeGrp(id){const g=S.groups.find(x=>x.id==id);if(g){g.closed=true;saveAll(true);render();}}
function delGrp(id){if(confirm('모임과 연결만 삭제돼요 (지출 기록은 유지). 삭제할까요?')){S.groups=S.groups.filter(g=>g.id!=id);saveAll();render();}}

/* ── 이체 ── */
function trView(){
  const gs=S.groups.filter(g=>!g.closed);
  const items=S.transfers.map(t=>{
    const g=t.groupId?S.groups.find(x=>x.id==t.groupId):null;
    return `<div class="item"><div class="l"><b>${t.name}</b><div>${t.date.slice(5)}${g?' · '+g.name:''}${t.memo?' · '+t.memo:''} · ${t.payer}</div></div>
    <div class="r"><b class="num" style="color:${t.dir==='in'?'var(--ok)':'var(--ink)'}">${t.dir==='in'?'+':'−'}${fmt(t.amount).slice(1)}</b><br><span class="pill ${t.dir==='in'?'p-in':pillOf(t.who)}">${t.dir==='in'?'받음':'보냄 · '+t.who}</span></div>
    <button class="del" onclick="delTr(${t.id})">✕</button></div>`;
  }).join('');
  return `<div class="card"><h2>이체 기록 <small>월세 · 정산 · 모임 송금</small></h2>
  <div class="seg"><button class="s-joint ${tform.dir==='out'?'on':''}" onclick="tform.dir='out';render()">보냄</button><button class="s-biz ${tform.dir==='in'?'on':''}" onclick="tform.dir='in';render()">받음</button></div>
  <div class="row"><input type="number" inputmode="numeric" placeholder="금액 (원)" value="${tform.amount}" oninput="tform.amount=this.value"><input placeholder="상대 / 내용 (예: 월세, 병찬)" value="${tform.name}" oninput="tform.name=this.value"></div>
  <div class="seg">${WHO.map(([w,cls])=>`<button class="s-${cls} ${tform.who===w?'on':''}" onclick="tform.who='${w}';render()">${w}</button>`).join('')}</div>
  ${tform.who==='모임'?`<div class="row"><select onchange="tform.groupId=this.value"><option value="">어느 모임?</option>${gs.map(g=>`<option value="${g.id}" ${tform.groupId===g.id?'selected':''}>${g.name}</option>`).join('')}</select></div>`:''}
  <div class="seg"><button class="s-me ${tform.payer==='태나'?'on':''}" onclick="tform.payer='태나';render()">태나 계좌</button><button class="s-him ${tform.payer==='지훈'?'on':''}" onclick="tform.payer='지훈';render()">지훈 계좌</button></div>
  <div class="row"><input placeholder="메모 (선택)" value="${tform.memo}" oninput="tform.memo=this.value"></div>
  <button class="btn" onclick="addTr()">기록하기</button>
  <p class="hint">받은 돈은 "받음"으로 — 지훈 정산 입금은 상대를 "지훈", 부담을 "공용"으로 찍으면 월 정산에서 자동 차감돼요.</p>
  </div>
  <div class="card"><h2>이번 달 이체 <small>${S.transfers.length}건</small></h2>${items||'<p class="hint">기록이 없어요.</p>'}</div>`;
}
function addTr(){
  const amt=parseInt(tform.amount)||0;
  if(!amt||!tform.name){alert('금액과 내용을 입력해 주세요');return;}
  if(tform.who==='모임'&&!tform.groupId){alert('모임을 선택해 주세요');return;}
  S.transfers.unshift({id:Date.now(),date:today(),name:tform.name,amount:amt,dir:tform.dir,who:tform.who,payer:tform.payer,groupId:tform.who==='모임'?tform.groupId:'',memo:tform.memo,kind:'이체'});
  tform={amount:'',name:'',dir:'out',who:'공용',payer:'태나',groupId:'',memo:''};
  saveAll(true);render();
}
function delTr(id){if(confirm('삭제할까요?')){S.transfers=S.transfers.filter(t=>t.id!==id);saveAll();render();}}

/* ── 정산 ── */
function calc(){
  let jFair=0,jPaid=0;
  const all=[...S.entries.map(e=>({amt:e.amount,who:e.who,payer:e.payer,gid:e.groupId,dir:'out',name:e.merchant})),
             ...S.transfers.map(t=>({amt:t.amount,who:t.who,payer:t.payer,gid:t.groupId,dir:t.dir,name:t.name}))];
  for(const x of all){
    const sign = x.dir==='in' ? -1 : 1;
    let fair=0;
    if(x.who==='공용'||x.who==='모임') fair=x.amt/2*sign;
    else if(x.who==='지훈') fair=x.amt*sign;
    jFair+=fair;
    if(x.payer==='지훈') jPaid+=x.amt*sign;
  }
  const cats={};
  S.entries.forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+e.amount;});
  const bywho={};
  S.entries.forEach(e=>{bywho[e.who]=(bywho[e.who]||0)+e.amount;});
  return {due:Math.round(jFair-jPaid),cats,bywho,total:S.entries.reduce((a,e)=>a+e.amount,0)};
}
function sumView(){
  const c=calc();
  const maxCat=Math.max(1,...Object.values(c.cats));
  const catRows=Object.entries(c.cats).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="catbar"><span style="min-width:110px">${k}</span><span class="track"><i style="width:${Math.round(v/maxCat*100)}%"></i></span><b class="num" style="min-width:90px;text-align:right">${fmt(v)}</b></div>`).join('');
  const whoRows=Object.entries(c.bywho).map(([k,v])=>`<div class="bar"><span><span class="pill ${pillOf(k)}">${k}</span></span><b class="num">${fmt(v)}</b></div>`).join('');
  const dir=c.due>=0?'지훈 → 태나':'태나 → 지훈';
  return `<div class="card">
    <div class="stat3"><div class="stat"><div class="lb">이번 달 카드 총액</div><div class="v num">${fmt(c.total)}</div></div>
    <div class="stat"><div class="lb">기록 건수</div><div class="v num">${S.entries.length+S.transfers.length}건</div></div></div>
    <h2>카테고리별</h2>${catRows||'<p class="hint">기록이 쌓이면 여기에 순위가 생겨요.</p>'}
    <h2 style="margin-top:14px">부담별</h2>${whoRows||''}
    <div class="settle"><div class="lb">${S.month} 정산 (공용·모임 반반 + 이체 반영)</div><div class="big num">${dir} ${fmt(Math.abs(c.due))}</div></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn ghost sm" style="flex:1" onclick="copyMsg()">지훈에게 보낼 요약 복사</button>
      <button class="btn sm" style="flex:1" onclick="exportXlsx()">엑셀로 내보내기</button>
    </div>
    <button class="btn ghost" style="margin-top:9px" onclick="closeMonth()">이번 달 마감 → 새 달 시작</button>
    <p class="hint">마감하면 이번 달 기록이 보관되고 빈 장부로 새 달이 시작돼요. 마감 전에 엑셀부터 내보내 두는 걸 추천해요.</p>
  </div>`;
}
function copyMsg(){
  const c=calc();
  const dir=c.due>=0?'네가 나한테':'내가 너한테';
  const cats=Object.entries(c.cats).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([k,v])=>k+' '+fmt(v)).join(' / ');
  const txt=`${S.month} 카드 정산 정리!\n· 레드카드 총 ${fmt(c.total)} (${S.entries.length}건)\n· 많이 쓴 곳: ${cats}\n· 공용 반반 + 모임·이체 반영해서\n👉 ${dir} ${fmt(Math.abs(c.due))} 보내면 끝!`;
  navigator.clipboard.writeText(txt).then(()=>alert('복사됐어요 — 카톡에 붙여넣기!')).catch(()=>prompt('복사해서 쓰세요:',txt));
}
function exportXlsx(){
  const rows=[...S.entries.map(e=>({일자:e.date,구분:'카드','사용처/내용':e.merchant,금액:e.amount,카테고리:e.cat,부담:e.who,'낸 사람':e.payer,모임:e.groupId?(S.groups.find(g=>g.id==e.groupId)||{}).name||'':'',메모:e.memo||''})),
              ...S.transfers.map(t=>({일자:t.date,구분:t.dir==='in'?'이체(받음)':'이체(보냄)','사용처/내용':t.name,금액:t.dir==='in'?-t.amount:t.amount,카테고리:'',부담:t.who,'낸 사람':t.payer,모임:t.groupId?(S.groups.find(g=>g.id==t.groupId)||{}).name||'':'',메모:t.memo||''}))].sort((a,b)=>a.일자<b.일자?-1:1);
  const c=calc();
  const sum=[...Object.entries(c.cats).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({항목:'카테고리: '+k,금액:v})),
             ...Object.entries(c.bywho).map(([k,v])=>({항목:'부담: '+k,금액:v})),
             {항목:'카드 총액',금액:c.total},{항목:(c.due>=0?'지훈→태나':'태나→지훈')+' 정산액',금액:Math.abs(c.due)}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'전체내역');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(sum),'월요약');
  XLSX.writeFile(wb,'카드장부_'+S.month+'.xlsx');
}
function closeMonth(){
  if(!confirm('이번 달을 마감하고 새 달을 시작할까요? (기록은 보관돼요)'))return;
  S.archive.push({month:S.month,entries:S.entries,transfers:S.transfers,groups:S.groups,result:calc()});
  const d=new Date();
  S.month=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  S.entries=[];S.transfers=[];S.groups=S.groups.filter(g=>!g.closed);
  saveAll(true);render();
}
load();
</script>
</body>
